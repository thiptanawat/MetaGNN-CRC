<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Data Processing Pipeline for MetaGNN-CRC Dataset</text>

  <!-- ═══════════ STAGE 1: Data Sources (top row) ═══════════ -->
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#666" font-style="italic">Stage 1: Raw Data Acquisition</text>

  <!-- TCGA box -->
  <rect x="30" y="75" width="200" height="85" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">TCGA-COAD/READ</text>
  <text x="130" y="113" text-anchor="middle" font-size="10" fill="#444">GDC Data Portal</text>
  <line x1="50" y1="120" x2="210" y2="120" stroke="#CBD5E1" stroke-width="0.5"/>
  <text x="130" y="135" text-anchor="middle" font-size="10" fill="#555">RNA-seq STAR gene counts</text>
  <text x="130" y="149" text-anchor="middle" font-size="10" fill="#555">690 patients (707 − 17 QC)</text>

  <!-- CPTAC box -->
  <rect x="260" y="75" width="200" height="85" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">CPTAC Proteomics</text>
  <text x="360" y="113" text-anchor="middle" font-size="10" fill="#444">PDC Data Portal (architecture-ready)</text>
  <line x1="280" y1="120" x2="440" y2="120" stroke="#CBD5E1" stroke-width="0.5"/>
  <text x="360" y="135" text-anchor="middle" font-size="10" fill="#555">PDC000111 / PDC000116</text>
  <text x="360" y="149" text-anchor="middle" font-size="10" fill="#555">Zero-filled in this release*</text>

  <!-- Recon3D box -->
  <rect x="500" y="75" width="200" height="85" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Recon3D v3</text>
  <text x="600" y="113" text-anchor="middle" font-size="10" fill="#444">VMH / COBRApy</text>
  <line x1="520" y1="120" x2="680" y2="120" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="600" y="135" text-anchor="middle" font-size="10" fill="#555">10,600 reactions, 5,835 metabolites</text>
  <text x="600" y="149" text-anchor="middle" font-size="10" fill="#555">Stoichiometric matrix + GPR rules</text>

  <!-- ChEBI box -->
  <rect x="730" y="75" width="200" height="85" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="830" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#9A3412">ChEBI / RDKit</text>
  <text x="830" y="113" text-anchor="middle" font-size="10" fill="#444">Molecular Descriptors</text>
  <line x1="750" y1="120" x2="910" y2="120" stroke="#FED7AA" stroke-width="0.5"/>
  <text x="830" y="135" text-anchor="middle" font-size="10" fill="#555">SMILES → 7 physico-chem</text>
  <text x="830" y="149" text-anchor="middle" font-size="10" fill="#555">+ 512 Morgan FP = 519-dim</text>

  <!-- ═══════════ Arrows from Stage 1 to Stage 2 (curved) ═══════════ -->
  <path d="M 130,160 C 130,180 130,200 130,222" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <path d="M 360,160 C 360,180 360,200 360,222" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <path d="M 600,160 C 600,180 600,200 600,222" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <path d="M 830,160 C 830,180 830,200 830,222" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ STAGE 2: Preprocessing (second row) ═══════════ -->
  <text x="480" y="210" text-anchor="middle" font-size="13" fill="#666" font-style="italic">Stage 2: Preprocessing &amp; Normalisation</text>

  <!-- RNA preprocessing -->
  <rect x="30" y="225" width="200" height="70" rx="6" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#854D0E">RNA-seq Processing</text>
  <text x="130" y="265" text-anchor="middle" font-size="9.5" fill="#555">Extract TPM, filter &lt;10% expr</text>
  <text x="130" y="280" text-anchor="middle" font-size="9.5" fill="#555">→ 40,799 genes × 690 patients</text>

  <!-- Proteomics preprocessing -->
  <rect x="260" y="225" width="200" height="70" rx="6" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1" filter="url(#shadow)"/>
  <text x="360" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#854D0E">Proteomics (Reserved)</text>
  <text x="360" y="265" text-anchor="middle" font-size="9.5" fill="#555">Zero-filled feature channel</text>
  <text x="360" y="280" text-anchor="middle" font-size="9.5" fill="#555">→ 0 × 690 patients (all zeros)</text>

  <!-- Graph construction -->
  <rect x="500" y="225" width="200" height="70" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Graph Construction</text>
  <text x="600" y="265" text-anchor="middle" font-size="9.5" fill="#555">SBML → substrate_of (20,512)</text>
  <text x="600" y="280" text-anchor="middle" font-size="9.5" fill="#555">+ produces (19,913) edges</text>

  <!-- Metabolite features -->
  <rect x="730" y="225" width="200" height="70" rx="6" fill="#FFEDD5" stroke="#EA580C" stroke-width="1" filter="url(#shadow)"/>
  <text x="830" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#9A3412">Metabolite Features</text>
  <text x="830" y="265" text-anchor="middle" font-size="9.5" fill="#555">519-dim per metabolite node</text>
  <text x="830" y="280" text-anchor="middle" font-size="9.5" fill="#555">Shared across all patients</text>

  <!-- ═══════════ Arrows from Stage 2 to Stage 3 (curved) ═══════════ -->
  <path d="M 130,295 C 130,320 220,340 290,358" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <path d="M 360,295 C 360,320 360,340 360,358" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <path d="M 600,295 C 600,320 540,340 500,358" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <path d="M 830,295 C 830,320 740,340 640,358" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ STAGE 3: Feature Engineering (center) ═══════════ -->
  <text x="480" y="345" text-anchor="middle" font-size="13" fill="#666" font-style="italic">Stage 3: Feature Engineering &amp; Graph Integration</text>

  <!-- GPR Mapping (large central box) -->
  <rect x="200" y="360" width="340" height="90" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">GPR Rule Mapping</text>
  <text x="370" y="403" text-anchor="middle" font-size="10" fill="#555">Gene expression → Reaction node features</text>
  <text x="370" y="418" text-anchor="middle" font-size="10" fill="#555">AND = min, OR = max (Zur et al. 2010)</text>
  <text x="370" y="433" text-anchor="middle" font-size="10" fill="#555">2-dim per reaction: [RNA, Prot*]</text>

  <!-- Metabolite features integration -->
  <rect x="570" y="360" width="200" height="90" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">HeteroData Assembly</text>
  <text x="670" y="403" text-anchor="middle" font-size="10" fill="#555">Reaction nodes: GPR features</text>
  <text x="670" y="418" text-anchor="middle" font-size="10" fill="#555">Metabolite nodes: 519-dim</text>
  <text x="670" y="433" text-anchor="middle" font-size="10" fill="#555">Edges: substrate_of + produces</text>

  <!-- Arrow between GPR and HeteroData (curved) -->
  <path d="M 540,405 C 550,405 558,405 568,405" fill="none" stroke="#7C3AED" stroke-width="1.2" marker-end="url(#arrowhead-blue)"/>

  <!-- ═══════════ Arrows from Stage 3 to Stage 4 (curved) ═══════════ -->
  <path d="M 370,450 C 370,470 370,490 370,512" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <path d="M 670,450 C 670,470 670,490 670,512" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ STAGE 4: Pseudo-Labels + Outputs ═══════════ -->
  <text x="480" y="500" text-anchor="middle" font-size="13" fill="#666" font-style="italic">Stage 4: Pseudo-Label Generation &amp; Output Tensors</text>

  <!-- Pseudo-label generation -->
  <rect x="200" y="515" width="340" height="80" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="540" text-anchor="middle" font-size="12" font-weight="bold" fill="#991B1B">Expression-Thresholded Labels</text>
  <text x="370" y="557" text-anchor="middle" font-size="10" fill="#555">Per-patient GPR eval → Cohort majority vote</text>
  <text x="370" y="572" text-anchor="middle" font-size="10" fill="#555">7,434 active / 3,166 inactive (70.1% / 29.9%)</text>
  <text x="370" y="587" text-anchor="middle" font-size="9" fill="#888">Pseudo-labels, not ground-truth flux measurements</text>

  <!-- Output tensors -->
  <rect x="570" y="515" width="200" height="80" rx="8" fill="#F0F9FF" stroke="#0284C7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="535" text-anchor="middle" font-size="12" font-weight="bold" fill="#075985">PyTorch Geometric</text>
  <text x="670" y="550" text-anchor="middle" font-size="12" font-weight="bold" fill="#075985">Output Tensors</text>
  <text x="670" y="567" text-anchor="middle" font-size="10" fill="#555">690 patient .pt files</text>
  <text x="670" y="582" text-anchor="middle" font-size="10" fill="#555">graph_structure.pt</text>
  <text x="670" y="597" text-anchor="middle" font-size="9" fill="#555">labels + metadata + splits</text>

  <!-- ═══════════ Final output arrow (curved) ═══════════ -->
  <path d="M 480,595 C 480,612 480,628 480,640" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Final dataset box -->
  <rect x="280" y="645" width="400" height="45" rx="10" fill="#1E293B" filter="url(#shadow)"/>
  <text x="480" y="667" text-anchor="middle" font-size="13" font-weight="bold" fill="#F8FAFC">MetaGNN-CRC Dataset</text>
  <text x="480" y="683" text-anchor="middle" font-size="10" fill="#94A3B8">GitHub + Zenodo (CC-BY 4.0) — Ready for GNN training</text>

  <!-- ═══════════ Side annotation: time savings ═══════════ -->
  <rect x="30" y="490" width="155" height="110" rx="6" fill="#FFF" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="107" y="512" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Without this dataset:</text>
  <text x="107" y="528" text-anchor="middle" font-size="9" fill="#64748B">GDC/PDC navigation: 2–3 days</text>
  <text x="107" y="542" text-anchor="middle" font-size="9" fill="#64748B">GPR parsing + SBML: 3–5 days</text>
  <text x="107" y="556" text-anchor="middle" font-size="9" fill="#64748B">Graph tensors: 1–2 days</text>
  <text x="107" y="570" text-anchor="middle" font-size="9" fill="#64748B">Debug dimensions: 2–3 days</text>
  <line x1="47" y1="578" x2="167" y2="578" stroke="#CBD5E1" stroke-width="0.5"/>
  <text x="107" y="593" text-anchor="middle" font-size="10" font-weight="bold" fill="#DC2626">Total: 2–4 weeks saved</text>

  <!-- Footnote for proteomics -->
  <text x="480" y="698" text-anchor="middle" font-size="8.5" fill="#94A3B8" font-style="italic">*Proteomic channel zero-filled: PDC000111 has no quant matrix; PDC000116 has zero TCGA overlap. Architecture supports future integration.</text>

</svg>
